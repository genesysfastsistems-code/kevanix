<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e3a8a">
<title>KEVANIX — Sistema Educativo</title>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<style>
:root{
  --brand:#1e3a8a; --brand2:#2563eb; --accent:#0ea5e9;
  --ok:#16a34a; --warn:#f59e0b; --bad:#dc2626;
  --bg:#f1f5f9; --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
  --radius:16px; --shadow:0 2px 12px rgba(15,23,42,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45}
img{max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:15px;width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--brand2);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:0 0 5px 2px}
.field{margin-bottom:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--brand2);color:#fff;font-weight:600;padding:12px 16px;border-radius:12px;font-size:15px;transition:.15s;width:100%}
.btn:active{transform:scale(.98)}
.btn.sec{background:#eef2ff;color:var(--brand)}
.btn.ok{background:var(--ok)}
.btn.bad{background:var(--bad)}
.btn.warn{background:var(--warn);color:#7c2d12}
.btn.ghost{background:transparent;color:var(--brand2);border:1px solid var(--line)}
.btn.sm{padding:8px 12px;font-size:13px;width:auto}
.row{display:flex;gap:10px}
.row>*{flex:1}
.hide{display:none!important}
.center{text-align:center}
.muted{color:var(--muted)}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700}
.pill.ok{background:#dcfce7;color:#166534}.pill.bad{background:#fee2e2;color:#991b1b}
.pill.warn{background:#fef3c7;color:#92400e}.pill.info{background:#dbeafe;color:#1e40af}
.pill.gray{background:#e2e8f0;color:#475569}

/* LOGIN */
#login{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:26px;background:linear-gradient(160deg,#1e3a8a,#2563eb 60%,#0ea5e9)}
#login .card{background:#fff;border-radius:22px;padding:26px 22px;box-shadow:0 20px 50px rgba(0,0,0,.28);max-width:420px;margin:0 auto;width:100%}
.logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--brand),var(--accent));display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 12px;box-shadow:var(--shadow)}
.brandname{text-align:center;font-weight:800;font-size:23px;letter-spacing:-.5px}
.brandsub{text-align:center;color:var(--muted);margin:2px 0 20px;font-size:13px}
.demo-users{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
.demo-users .du{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;font-size:13px}
.demo-users .du b{font-size:13px}

/* APP SHELL */
#app{display:none;min-height:100vh;padding-bottom:74px}
.topbar{position:sticky;top:0;z-index:20;background:var(--brand);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.topbar .tlogo{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar h1{font-size:16px;margin:0;font-weight:700}
.topbar .sub{font-size:11px;opacity:.85;margin-top:1px}
.topbar .spacer{flex:1}
.iconbtn{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.14);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center}
.content{padding:16px;max-width:760px;margin:0 auto}
.pagetitle{font-size:20px;font-weight:800;margin:2px 0 14px;letter-spacing:-.4px}

/* CARDS / GRID */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.card h3{margin:0 0 10px;font-size:15px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px}
.stat .n{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat .l{font-size:12px;color:var(--muted);margin-top:5px;font-weight:600}
.stat .ico{font-size:20px;margin-bottom:6px;display:block}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mtile{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 14px;text-align:left;transition:.15s}
.mtile:active{transform:scale(.97)}
.mtile .ic{font-size:24px}
.mtile .tt{font-weight:700;margin-top:8px;font-size:14px}
.mtile .ds{font-size:11.5px;color:var(--muted);margin-top:2px}

/* LIST */
.list{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.li{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid var(--line)}
.li:last-child{border-bottom:none}
.li .av{width:40px;height:40px;border-radius:11px;background:#eef2ff;color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.li .tx{flex:1;min-width:0}
.li .tx b{font-size:14.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li .tx small{color:var(--muted);font-size:12px}
.li .rt{text-align:right;flex-shrink:0}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;padding:8px 8px;border-bottom:2px solid var(--line)}
.tbl td{padding:9px 8px;border-bottom:1px solid var(--line)}
.tbl tr:last-child td{border-bottom:none}
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#fff;border-top:1px solid var(--line);display:flex;padding:6px 4px 8px;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10.5px;font-weight:600;padding:4px 2px}
.bottomnav button .bi{font-size:20px}
.bottomnav button.active{color:var(--brand2)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:20px;animation:slideup .25s}
@keyframes slideup{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.modal h2{margin:0 0 4px;font-size:18px}
.modal .close{position:absolute}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.chip{display:inline-block;padding:6px 12px;border-radius:999px;background:#eef2ff;color:var(--brand);font-size:12.5px;font-weight:600;margin:0 6px 6px 0;border:1px solid transparent}
.chip.active{background:var(--brand2);color:#fff}
.sectionlabel{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:18px 2px 8px}
.empty{text-align:center;color:var(--muted);padding:30px 16px}
.empty .ic{font-size:38px;opacity:.4}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 20px;border-radius:999px;font-size:13.5px;z-index:100;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:slideup .2s}
.fab{position:fixed;bottom:88px;right:16px;width:56px;height:56px;border-radius:18px;background:var(--brand2);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(37,99,235,.4);z-index:25}
.hr{height:1px;background:var(--line);margin:14px 0}
.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv:last-child{border:none}
.kv span{color:var(--muted)}.kv b{font-weight:700}
.bar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:var(--brand2);border-radius:999px}
.seg{display:flex;background:#eef2ff;border-radius:12px;padding:4px;margin-bottom:14px}
.seg button{flex:1;padding:8px;border-radius:9px;font-size:13px;font-weight:600;color:var(--brand)}
.seg button.active{background:#fff;color:var(--brand2);box-shadow:var(--shadow)}
</style>
</head>

<!-- ================= PANTALLA DE CONEXIÓN ================= -->
<div id="bootScreen" style="position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,#0a0e2e,#1e3a8a 60%,#22d3ee);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff">
  <div style="width:74px;height:74px;border-radius:20px;background:#070b22;border:2px solid #22d3ee;display:flex;align-items:center;justify-content:center;font-size:34px;color:#22d3ee;box-shadow:0 0 30px #22d3ee66">◁</div>
  <div style="font-weight:800;font-size:22px;margin-top:16px;letter-spacing:-.5px">KEVANIX</div>
  <div style="opacity:.85;margin-top:6px;font-size:14px">Conectando a la nube…</div>
</div>

<!-- ================= LOGIN ================= -->
<div id="login" style="display:none">
  <div class="card">
    <div class="logo" id="loginLogo">🎓</div>
    <div class="brandname" id="loginBrand">KEVANIX</div>
    <div class="brandsub">Sistema Educativo</div>
    <div class="field">
      <label>Usuario</label>
      <input id="lgUser" placeholder="Tu usuario" autocomplete="off">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input id="lgPass" type="password" placeholder="••••••" autocomplete="off">
    </div>
    <button class="btn" onclick="doLogin()">Ingresar</button>
    <div id="lgErr" class="center" style="color:var(--bad);font-size:13px;margin-top:10px;font-weight:600"></div>
    <div class="demo-users">
      <div class="muted center" style="font-size:12px;margin-bottom:10px">Cuentas de demostración (tocá para usar)</div>
      <div id="demoList"></div>
    </div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <div class="topbar">
    <div class="tlogo" id="tbLogo">🎓</div>
    <div>
      <h1 id="tbTitle">Inicio</h1>
      <div class="sub" id="tbSub"></div>
    </div>
    <div class="spacer"></div>
    <button class="iconbtn" onclick="logout()" title="Salir">⏻</button>
  </div>
  <div class="content" id="view"></div>
  <div class="bottomnav" id="nav"></div>
</div>

// Moneda: Guaraníes (₲) — separador de miles con punto, sin decimales
function money(n){return '₲ '+Math.round(Number(n||0)).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
// Para PDF: la fuente estándar no tiene el símbolo ₲, usamos "Gs."
function moneyG(n){return 'Gs. '+Math.round(Number(n||0)).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
const hoy=()=>new Date().toISOString().slice(0,10);
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function fmtFecha(d){if(!d)return'—';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}

/* --------- Notas: escala MEC Paraguay (1 a 5) --------- */
const NOTA_MIN=1, NOTA_MAX=5, NOTA_APRUEBA=2;
const NOTA_LABELS={5:'Muy bueno / Excelente',4:'Bueno / Satisfactorio',3:'Regular / Aceptable',2:'Poco satisfactorio',1:'Reprobado'};
function notaLabel(n){return NOTA_LABELS[Math.round(Number(n))]||'—';}
function notaColor(n){n=Number(n);return n>=4?'var(--ok)':n>=3?'var(--warn)':n>=NOTA_APRUEBA?'#ea580c':'var(--bad)';}
function promedio(arr){return arr.length?(arr.reduce((s,x)=>s+x,0)/arr.length).toFixed(2):'—';}

/* --------- Imágenes: comprimir a JPEG antes de guardar --------- */
function readImage(file,max,cb,quality){
  if(!file)return;quality=quality||0.72;
  const r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{
    let w=img.width,h=img.height;const s=Math.min(1,max/Math.max(w,h));
    w=Math.round(w*s);h=Math.round(h*s);
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    try{cb(c.toDataURL('image/jpeg',quality));}catch(err){cb(e.target.result);}
  };img.onerror=()=>cb(null);img.src=e.target.result;};
  r.readAsDataURL(file);
}
function avatarAlumno(a){
  return a.foto?`<div class="av" style="padding:0;overflow:hidden"><img src="${a.foto}" style="width:100%;height:100%;object-fit:cover"></div>`
                :`<div class="av">${(a.nombre||'?')[0]}</div>`;
}

let fdb=null, fst=null, _dataUnsub=[], _lastJSON={}, _regUnsub=null, _pagosUnsub=null, _superReal=null;
const COLLS_DATA=['alumnos','docentes','materias','notas','asistencia','mensualidades','caja','comunicados','eventos','examenes','horarioClases','tareas'];
function regRef(){return fdb.collection('kevanix').doc('registry');}
function pagosRef(){return fdb.collection('kevanix').doc('pagos');}
function setupRef(){return fdb.collection('kevanix').doc('setup');}
function usersCol(){return fdb.collection('users');}
function dataRef(cidv,name){return fdb.collection('kevanix_colegios').doc(cidv).collection('data').doc(name);}
function emailDe(usuario){return String(usuario).toLowerCase().replace(/[^a-z0-9._-]/g,'')+'@kevanix.app';}
function secApp(){ try{return firebase.app('sec');}catch(e){return firebase.initializeApp(firebaseConfig,'sec');} }

async function cloudBoot(){
  try{ firebase.initializeApp(firebaseConfig); fdb=firebase.firestore(); }
  catch(e){ return cloudError('No se pudo iniciar Firebase.'); }
  try{ fst=firebase.storage(); }catch(e){ fst=null; }
  try{ await ensureSeed(); }catch(e){ console.warn('seed:',e&&e.message); }
  firebase.auth().onAuthStateChanged(async(user)=>{
    const b=document.getElementById('bootScreen'); if(b)b.style.display='none';
    if(!user){ mostrarLogin(); return; }
    let prof=null;
    try{ const d=await usersCol().doc(user.uid).get(); prof=d.exists?d.data():null; }catch(e){}
    if(!prof){ toast('Perfil no encontrado'); await firebase.auth().signOut(); mostrarLogin(); return; }
    session={uid:user.uid, ...prof};
    if(prof.rol==='superadmin')_superReal=session;
    state.colegioActivo = prof.rol==='superadmin' ? null : prof.colegioId;
    escucharRegistro();
    listenColegio(state.colegioActivo);
    document.getElementById('lgErr').textContent='';
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    buildNav(); go('home');
  });
}
function mostrarLogin(){ session=null; document.getElementById('app').style.display='none'; document.getElementById('login').style.display='flex'; }
function escucharRegistro(){
  if(!_regUnsub) _regUnsub=regRef().onSnapshot(d=>{ DB.colegios=(d.data()||{}).colegios||[]; rerender(); });
  if(session && session.rol==='superadmin' && !_pagosUnsub)
    _pagosUnsub=pagosRef().onSnapshot(d=>{ DB.pagosMembresia=(d.data()||{}).items||[]; rerender(); });
}
async function ensureSeed(){
  const setup=await setupRef().get();
  if(setup.exists && setup.data().authSeeded) return;
  const s=seed();
  await regRef().set({colegios:s.colegios});
  await pagosRef().set({items:s.pagosMembresia||[]});
  for(const name of COLLS_DATA){ await dataRef('col_demo',name).set({items:s[name]||[]}); }
  const sec=secApp();
  for(const u of s.usuarios){
    try{
      const cred=await sec.auth().createUserWithEmailAndPassword(emailDe(u.usuario),u.pass);
      const perfil={usuario:u.usuario.toLowerCase(),nombre:u.nombre,rol:u.rol,colegioId:u.colegioId||null};
      if(u.alumnoId)perfil.alumnoId=u.alumnoId; if(u.docenteId)perfil.docenteId=u.docenteId;
      await usersCol().doc(cred.user.uid).set(perfil);
    }catch(e){ /* usuario ya existe */ }
  }
  try{ await sec.auth().signOut(); }catch(e){}
  await setupRef().set({authSeeded:true});
}
function cloudError(msg){
  const b=document.getElementById('bootScreen');
  if(b)b.innerHTML=`<div style="max-width:340px;text-align:center;color:#e8edff;padding:24px">
    <div style="font-size:40px">⚠️</div>
    <div style="font-weight:700;margin:10px 0">${msg}</div>
    <button class="btn" onclick="location.reload()" style="max-width:200px;margin:8px auto 0">Reintentar</button></div>`;
  console.error('CLOUD:',msg);
}
function listenColegio(cidv){
  _dataUnsub.forEach(u=>{try{u();}catch(e){}}); _dataUnsub=[];
  COLLS_DATA.forEach(n=>{DB[n]=[];}); DB.usuarios=[];
  if(!cidv)return;
  COLLS_DATA.forEach(name=>{
    const u=dataRef(cidv,name).onSnapshot(d=>{
      DB[name]=(d.data()||{}).items||[];
      _lastJSON[cidv+'/'+name]=JSON.stringify(DB[name]);
      rerender();
    });
    _dataUnsub.push(u);
  });
  // Lista de usuarios del colegio (solo admin/dueño pueden leerla)
  if(session && (['admin','superadmin'].includes(session.rol)||session._super)){
    const uu=usersCol().where('colegioId','==',cidv).onSnapshot(s=>{
      DB.usuarios=s.docs.map(d=>({uid:d.id,...d.data()})); rerender();
    },e=>{});
    _dataUnsub.push(uu);
  }
}
function rerender(){ if(!session)return; if(document.getElementById('modalBg'))return; try{go(state.view);}catch(e){} }
async function save(){
  if(!fdb||!session)return;
  const writes=[];
  const put=(key,ref,val)=>{const j=JSON.stringify(val);if(_lastJSON[key]!==j){_lastJSON[key]=j;writes.push(ref.set(val));}};
  if(['admin','superadmin'].includes(session.rol)||session._super) put('registry',regRef(),{colegios:DB.colegios});
  if(session.rol==='superadmin') put('pagos',pagosRef(),{items:DB.pagosMembresia||[]});
  const cidv=state.colegioActivo;
  if(cidv){ COLLS_DATA.forEach(name=>put(cidv+'/'+name,dataRef(cidv,name),{items:DB[name]||[]})); }
  try{ await Promise.all(writes); }catch(e){ console.error('save',e); toast('⚠️ Error al guardar en la nube'); }
}

async function guardarColegio(){
  const nom=val('f_nom');if(!nom)return toast('Ingresá el nombre');
  const usuario=val('f_user').toLowerCase();const pass=val('f_pass');
  if(!usuario||!pass)return toast('Ingresá usuario y contraseña');
  if(pass.length<6)return toast('La contraseña debe tener al menos 6 caracteres');
  const plan=val('f_plan');
  const d=new Date();d.setFullYear(d.getFullYear()+1);
  const nuevoId=uid('col');
  let uidNuevo;
  toast('Creando cuenta de acceso…');
  try{
    const sec=secApp();
    const cred=await sec.auth().createUserWithEmailAndPassword(emailDe(usuario),pass);
    uidNuevo=cred.user.uid;
    try{await sec.auth().signOut();}catch(e){}
  }catch(e){
    if(e&&e.code==='auth/email-already-in-use')return toast('Ese usuario ya existe, elegí otro');
    return toast('No se pudo crear el usuario: '+((e&&e.message)||''));
  }
  try{ await usersCol().doc(uidNuevo).set({usuario,nombre:val('f_dir')||nom,rol:'admin',colegioId:nuevoId}); }
  catch(e){ return toast('No se pudo guardar el perfil del usuario'); }
  DB.colegios.push({id:nuevoId,nombre:nom,plan,membresiaVence:d.toISOString().slice(0,10),activo:true,color:'#1e3a8a',director:val('f_dir'),telefono:val('f_tel'),logo:null,matricula:150000});
  save();closeModal();
  toast('✅ Membresía creada · usuario: '+usuario);
  go('colegios');
}

function venderMembresia(){
  const c=colegio(val('v_col'));if(!c)return toast('Elegí un colegio');
  const plan=val('v_plan'),mod=val('v_mod');const precio=PLAN_PRECIO[plan]||0;
  const base=(c.membresiaVence&&c.membresiaVence>hoy())?new Date(c.membresiaVence):new Date();
  let monto;
  if(mod==='anual'){monto=precio*10;base.setFullYear(base.getFullYear()+1);}
  else{monto=precio;base.setMonth(base.getMonth()+1);}
  c.plan=plan;c.activo=true;c.membresiaVence=base.toISOString().slice(0,10);
  DB.pagosMembresia=DB.pagosMembresia||[];
  const pago={id:uid('pm'),colegioId:c.id,fecha:hoy(),plan,modalidad:mod,monto};
  DB.pagosMembresia.push(pago);
  save();toast('✅ Pago '+(mod==='anual'?'anual':'mensual')+' registrado · '+money(monto));
  pdfReciboMembresia(c,pago);
  go('membresias');
}

function pdfReciboMembresia(c,pago){

  doc.setFont(undefined,'normal');doc.setFontSize(11);doc.text('Fecha: '+fmtFecha(pago.fecha),150,y);y+=12;
  const kv=(k,v)=>{doc.setFont(undefined,'bold');doc.text(k,14,y);doc.setFont(undefined,'normal');doc.text(String(v),60,y);y+=8;};
  kv('Institución:',c.nombre);
  kv('Plan:',pago.plan);
  kv('Modalidad:',pago.modalidad==='anual'?'Anual (2 meses gratis)':'Mensual');
  kv('Vence:',fmtFecha(c.membresiaVence));
  y+=5;doc.setFillColor(240,244,255);doc.rect(14,y-6,182,14,'F');
  doc.setFont(undefined,'bold');doc.setFontSize(14);doc.text('TOTAL PAGADO:',18,y+3);doc.text(moneyG(pago.monto),150,y+3);y+=19;
  doc.setFont(undefined,'normal');doc.setFontSize(10);doc.text('Son: '+numeroALetras(pago.monto)+' guaraníes.',14,y);y+=22;
  doc.setDrawColor(120);doc.line(120,y,190,y);y+=6;doc.text('Recibí conforme',138,y);
  doc.setFontSize(8);doc.setTextColor(120);doc.text('KEVANIX · Tecnología que conecta · '+fmtFecha(pago.fecha),14,285);
  doc.save('Recibo_Membresia_'+nro+'.pdf');toast('🧾 Recibo N° '+nro);
}

function renderNotasTabla(){
  const mid=val('nt_mat'),per=val('nt_per');const m=materia(mid);if(!m)return;
  const als=q('alumnos').filter(a=>a.grado===m.grado);
  const cont=document.getElementById('notasTabla');
  cont.innerHTML=`<div class="card"><h3>${m.nombre} — ${m.grado}</h3>
    <div class="muted" style="font-size:12px;margin-bottom:6px">Escala MEC 1–5 (aprueba desde ${NOTA_APRUEBA}). 5 Excelente · 4 Satisf. · 3 Regular · 2 Poco satisf. · 1 Reprobado.</div>
    ${als.map(a=>{const nt=DB.notas.find(n=>n.alumnoId===a.id&&n.materiaId===mid&&n.periodo===per);
      return `<div class="li" style="padding:10px 0">${avatarAlumno(a)}<div class="tx"><b>${a.nombre}</b>${nt?`<small style="color:${notaColor(nt.nota)}">${notaLabel(nt.nota)}</small>`:''}</div>
        <input type="number" min="${NOTA_MIN}" max="${NOTA_MAX}" step="1" style="width:64px;text-align:center;font-weight:700" value="${nt?nt.nota:''}" placeholder="—" onchange="setNota('${a.id}','${mid}','${per}',this.value)"></div>`;}).join('')||empty('Sin alumnos en este grado')}
    </div>`;
}
function setNota(aid,mid,per,v){
  v=Math.round(parseFloat(v));if(isNaN(v))return;
  if(v<NOTA_MIN)v=NOTA_MIN; if(v>NOTA_MAX)v=NOTA_MAX;
  let nt=DB.notas.find(n=>n.alumnoId===aid&&n.materiaId===mid&&n.periodo===per);
  if(nt)nt.nota=v;else DB.notas.push({id:uid('n'),colegioId:cid(),alumnoId:aid,materiaId:mid,periodo:per,nota:v});
  save();toast(notaLabel(v)+' ('+v+')');renderNotasTabla();
}

function cuLink(){
  const tipo=val('cu_tipo');const w=document.getElementById('cu_linkWrap');if(!w)return;
  if(tipo==='docente'){
    const ds=q('docentes');
    w.innerHTML=`<label>Docente</label>`+(ds.length?`<select id="cu_link">${ds.map(d=>`<option value="${d.id}">${d.nombre}</option>`).join('')}</select>`:`<div class="muted" style="font-size:12px">No hay docentes. Cargalos primero en Académico → Docentes.</div>`);
  }else{
    const als=q('alumnos');
    w.innerHTML=`<label>Alumno</label>`+(als.length?`<select id="cu_link">${als.map(a=>`<option value="${a.id}">${a.nombre} — ${a.grado}</option>`).join('')}</select>`:`<div class="muted" style="font-size:12px">No hay alumnos. Cargalos primero en Académico → Alumnos.</div>`);
  }
}
async function crearCuentaUsuario(){
  const tipo=val('cu_tipo');const usuario=val('cu_user').toLowerCase();const pass=val('cu_pass');
  if(!usuario||!pass)return toast('Ingresá usuario y contraseña');
  if(pass.length<6)return toast('La contraseña debe tener al menos 6 caracteres');
  const linkEl=document.getElementById('cu_link');if(!linkEl)return toast('Cargá primero docentes/alumnos');
  const perfil={usuario,colegioId:cid()};
  if(tipo==='docente'){const d=docente(linkEl.value);if(!d)return toast('Elegí un docente');perfil.rol='docente';perfil.docenteId=d.id;perfil.nombre=d.nombre;}
  else if(tipo==='alumno'){const a=alumno(linkEl.value);if(!a)return toast('Elegí un alumno');perfil.rol='alumno';perfil.alumnoId=a.id;perfil.nombre=a.nombre;}
  else{const a=alumno(linkEl.value);if(!a)return toast('Elegí un alumno');perfil.rol='familia';perfil.alumnoId=a.id;perfil.nombre=a.tutor||('Familia de '+a.nombre);}
  toast('Creando cuenta…');
  try{
    const sec=secApp();
    const cred=await sec.auth().createUserWithEmailAndPassword(emailDe(usuario),pass);
    await usersCol().doc(cred.user.uid).set(perfil);
    try{await sec.auth().signOut();}catch(e){}
  }catch(e){
    if(e&&e.code==='auth/email-already-in-use')return toast('Ese usuario ya existe, elegí otro');
    return toast('No se pudo crear: '+((e&&e.message)||''));
  }
  closeModal();toast('✅ Cuenta creada: '+usuario);go('usuarios');
}
async function borrarCuenta(uidv){
  if(!confirm('¿Quitar el acceso de este usuario?'))return;
  try{ await usersCol().doc(uidv).delete(); toast('Acceso eliminado'); }catch(e){ toast('No se pudo eliminar'); }
  go('usuarios');
}

/* ============================================================
   MINI-PDF (generador propio, sin librerías, 100% offline)
   Emula el subconjunto de jsPDF que usamos. Coordenadas en mm.
   ============================================================ */
function jpegSize(bin){
  // devuelve {w,h} leyendo el marcador SOF de un JPEG (string binario)
  let i=2;const len=bin.length;
  while(i<len-8){
    if(bin.charCodeAt(i)!==0xFF){i++;continue;}
    const m=bin.charCodeAt(i+1);
    if(m>=0xC0&&m<=0xCF&&m!==0xC4&&m!==0xC8&&m!==0xCC){
      const h=(bin.charCodeAt(i+5)<<8)|bin.charCodeAt(i+6);
      const w=(bin.charCodeAt(i+7)<<8)|bin.charCodeAt(i+8);
      return {w,h};
    }
    const seg=(bin.charCodeAt(i+2)<<8)|bin.charCodeAt(i+3);
    if(seg<2)break;
    i+=2+seg;
  }
  return {w:0,h:0};
}
function makeDoc(){
  const K=72/25.4, PW=210, PH=297; // A4 mm
  const ops=[]; // graphics operators (content stream)
  const imgs=[]; // imágenes XObject (JPEG)
  let fillC=[0,0,0], textC=[0,0,0], stroke=[0.6,0.6,0.6], size=12, bold=false;
  const esc=s=>String(s).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
  const yb=y=>(PH-y)*K; // flip Y (baseline)
  const rgb=(r,g,b)=>[r/255,(g==null?r:g)/255,(b==null?r:b)/255];
  return {
    setFillColor(r,g,b){fillC=rgb(r,g,b);},   // color de figuras (rect)
    setTextColor(r,g,b){textC=rgb(r,g,b);},    // color de texto (independiente)
    setDrawColor(r,g,b){stroke=rgb(r,g,b);},
    setFontSize(n){size=n;},
    setFont(_f,style){bold=(style==='bold');},
    rect(x,y,w,h,style){ // 'F' filled
      ops.push(`${fillC[0].toFixed(3)} ${fillC[1].toFixed(3)} ${fillC[2].toFixed(3)} rg`);
      ops.push(`${(x*K).toFixed(2)} ${((PH-(y+h))*K).toFixed(2)} ${(w*K).toFixed(2)} ${(h*K).toFixed(2)} re f`);
    },
    line(x1,y1,x2,y2){
      ops.push(`${stroke[0].toFixed(3)} ${stroke[1].toFixed(3)} ${stroke[2].toFixed(3)} RG 0.4 w`);
      ops.push(`${(x1*K).toFixed(2)} ${yb(y1).toFixed(2)} m ${(x2*K).toFixed(2)} ${yb(y2).toFixed(2)} l S`);
    },
    text(str,x,y){
      const f=bold?'F2':'F1';
      ops.push('BT '+`${textC[0].toFixed(3)} ${textC[1].toFixed(3)} ${textC[2].toFixed(3)} rg`+
        ` /${f} ${size} Tf 1 0 0 1 ${(x*K).toFixed(2)} ${yb(y).toFixed(2)} Tm (${esc(str)}) Tj ET`);
    },
    // Inserta una imagen JPEG (dataURL) en (x,y = esquina superior izq, mm) con tamaño w×h mm
    addImageJPEG(dataUrl,x,y,w,h){
      if(!dataUrl||dataUrl.indexOf('data:image/jpeg')!==0)return;
      const bin=atob(dataUrl.split(',')[1]);
      const sz=jpegSize(bin); if(!sz.w||!sz.h)return;
      const name='Im'+(imgs.length+1);
      imgs.push({name,bin,w:sz.w,h:sz.h});
      ops.push(`q ${(w*K).toFixed(2)} 0 0 ${(h*K).toFixed(2)} ${(x*K).toFixed(2)} ${((PH-(y+h))*K).toFixed(2)} cm /${name} Do Q`);
    },
    save(filename){
      const content=ops.join('\n');
      const objs=[];
      const nImg=imgs.length, imgStart=7;
      const xobj=nImg?(' /XObject << '+imgs.map((im,i)=>`/${im.name} ${imgStart+i} 0 R`).join(' ')+' >>'):'';
      objs[1]='<< /Type /Catalog /Pages 2 0 R >>';
      objs[2]='<< /Type /Pages /Kids [3 0 R] /Count 1 >>';
      objs[3]=`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${(PW*K).toFixed(2)} ${(PH*K).toFixed(2)}] /Resources << /Font << /F1 5 0 R /F2 6 0 R >>${xobj} >> /Contents 4 0 R >>`;
      objs[4]=`<< /Length ${content.length} >>\nstream\n${content}\nendstream`;
      objs[5]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>';
      objs[6]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>';
      imgs.forEach((im,i)=>{objs[imgStart+i]=`<< /Type /XObject /Subtype /Image /Width ${im.w} /Height ${im.h} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${im.bin.length} >>\nstream\n${im.bin}\nendstream`;});
      let pdf='%PDF-1.4\n';
      const off=[0];
      for(let i=1;i<objs.length;i++){off[i]=pdf.length;pdf+=`${i} 0 obj\n${objs[i]}\nendobj\n`;}
      const xref=pdf.length;
      pdf+=`xref\n0 ${objs.length}\n0000000000 65535 f \n`;
      for(let i=1;i<objs.length;i++)pdf+=String(off[i]).padStart(10,'0')+' 00000 n \n';
      pdf+=`trailer\n<< /Size ${objs.length} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;
      // latin1 bytes (soporta acentos español vía WinAnsi)
      const bytes=new Uint8Array(pdf.length);
      for(let i=0;i<pdf.length;i++)bytes[i]=pdf.charCodeAt(i)&0xff;
      // En la APK Android usamos el puente nativo para guardar en Descargas
      if(window.AndroidPDF&&window.AndroidPDF.save){
        let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
        window.AndroidPDF.save(filename, btoa(bin));
        return;
      }
      // En navegador web: descarga normal
      const blob=new Blob([bytes],{type:'application/pdf'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();
      setTimeout(()=>{a.remove();URL.revokeObjectURL(url);},1500);
    }
  };
}

/* -------- Número a letras (para la boleta) -------- */
function numeroALetras(n){
  n=Math.round(Number(n)||0);
  if(n===0)return 'cero';
  const uni=['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte'];
  const dec=['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
  const cen=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
  function tres(x){
    if(x===0)return '';
    if(x===100)return 'cien';
    let s='';const c=Math.floor(x/100),r=x%100;
    if(c)s+=cen[c]+(r?' ':'');
    if(r<=20)s+=uni[r];
    else{const d=Math.floor(r/10),u=r%10;
      if(d===2)s+=u?'veinti'+uni[u]:'veinte';
      else s+=dec[d]+(u?' y '+uni[u]:'');}
    return s.trim();
  }
  let s='';
  const mill=Math.floor(n/1000000),miles=Math.floor((n%1000000)/1000),resto=n%1000;
  if(mill){s+=(mill===1?'un millón':tres(mill)+' millones');if(miles||resto)s+=' ';}
  if(miles){s+=(miles===1?'mil':tres(miles)+' mil');if(resto)s+=' ';}
  if(resto)s+=tres(resto);
  return s.trim();
}

function empty(t,s){return `<div class="empty"><div class="ic">📭</div><div style="font-weight:600;margin-top:6px">${t}</div>${s?`<div style="font-size:13px">${s}</div>`:''}</div>`;}
function modal(html){closeModal();const bg=document.createElement('div');bg.className='modal-bg';bg.id='modalBg';
  bg.innerHTML=`<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  bg.onclick=closeModal;document.body.appendChild(bg);}
function closeModal(){const m=document.getElementById('modalBg');if(m)m.remove();}
