name: Compilar APK KEVANIX
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Preparar keystore
        run: |
          echo -n "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' > ks.b64
          echo "Longitud base64: $(wc -c < ks.b64)  (deberia ser 3684)"
          base64 -d ks.b64 > "$RUNNER_TEMP/kevanix.jks"
          echo "Tamano keystore: $(wc -c < "$RUNNER_TEMP/kevanix.jks") bytes  (deberia ser 2762)"
      - name: Compilar APK firmado
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/kevanix.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon --stacktrace
      - name: Subir APK firmado
        uses: actions/upload-artifact@v4
        with:
          name: KEVANIX-APK-firmado
          path: app/build/outputs/apk/release/*.apk
